<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>iBooks Classic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="ios-toolbar">
        <div class="toolbar-left">
            <button class="ios-btn">Коллекции</button>
            <button class="ios-btn" id="reload-btn" title="Обновить библиотеку">⟳</button>
        </div>
        <h1 class="ios-title">Книги</h1>
        <button class="ios-btn btn-edit">Правка</button>
    </header>

    <main class="bookshelf-container" id="main-shelf">
        <div class="loading-status">Загрузка библиотеки...</div>
    </main>

    <!-- Окно читалки теперь ДО скрипта -->
    <div id="reader-overlay" class="reader-hidden">
        <header class="ios-toolbar">
            <button class="ios-btn" id="close-reader">Библиотека</button>
            <h1 class="ios-title" id="reader-book-title">Книга</h1>
            <div style="width: 60px;"></div>
        </header>
        
        <div class="reader-content">
            <div class="page" id="page-content"></div>
        </div>

        <footer class="reader-footer">
            <button class="ios-btn" id="prev-page">◀</button>
            <span id="page-number"></span>
            <button class="ios-btn" id="next-page">▶</button>
        </footer>
    </div>

    <!-- Скрипт в самом конце -->
    <script src="renderer.js"></script>
</body>
</html>
